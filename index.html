<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Azure AI Speech Assistant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0078D4,
        #50E6FF
    );
}

.container{
    width:90%;
    max-width:700px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#0078D4;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:180px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:15px;
    resize:none;
    font-size:16px;
}

textarea:focus{
    outline:none;
    border-color:#0078D4;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#0078D4;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#106EBE;
}

.loading{
    text-align:center;
    margin-top:15px;
    color:#0078D4;
    display:none;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#F3F9FD;
    border-left:5px solid #0078D4;
    border-radius:10px;
    display:none;
}

audio{
    width:100%;
    margin-top:15px;
}

.status{
    color:#107C10;
    font-weight:bold;
    margin-bottom:10px;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">
        🎙 Azure AI Speech
    </div>

    <div class="subtitle">
        Convert text into speech using Azure AI Services
    </div>

    <textarea
        id="speechText"
        placeholder="Type something..."
    ></textarea>

    <button onclick="generateSpeech()">
        Generate Speech
    </button>

    <div class="loading" id="loading">
        Generating audio...
    </div>

    <div class="result" id="result">
        <div class="status">
            ✅ Audio generated successfully
        </div>

        <audio
            id="player"
            controls
        ></audio>

        <pre id="jsonOutput"></pre>
    </div>

</div>

<script>

async function generateSpeech(){

    const text =
        document.getElementById("speechText").value;

    if(!text){
        alert("Please enter text");
        return;
    }

    document.getElementById("loading").style.display =
        "block";

    document.getElementById("result").style.display =
        "none";

    try{

        const response =
            await fetch(
                "http://localhost:8000/speak",
                {
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        text:text
                    })
                }
            );

        const data =
            await response.json();

        document.getElementById("jsonOutput")
            .textContent =
            JSON.stringify(data,null,2);

        document.getElementById("player").src =
            "http://localhost:8000/audio?t="
            + new Date().getTime();

        document.getElementById("result")
            .style.display =
            "block";

    }
    catch(error){

        alert(
            "Error connecting to API"
        );

        console.error(error);
    }

    document.getElementById("loading")
        .style.display =
        "none";
}

</script>

</body>
</html>
